<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>audio dump</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #0a0a0c;
  --card:  #131317;
  --bord:  #1f1f27;
  --green: #4ade80;
  --red:   #ef4444;
  --text:  #c0c0cc;
  --mute:  #40404c;
  --mono:  'SF Mono','Fira Code','Cascadia Code',ui-monospace,monospace;
}
html { height:100%; }
body { min-height:100%; overflow-y:auto; background:var(--bg); color:var(--text); font-family:var(--mono); display:flex; flex-direction:column; align-items:center; padding:52px 20px 56px; }
.eye { font-size:10px; letter-spacing:5px; text-transform:uppercase; color:var(--mute); margin-bottom:44px; }

#bird {
  margin-top:22px; padding:10px 22px; border-radius:20px;
  border:1.5px solid var(--bord); background:var(--card); color:var(--mute);
  display:flex; align-items:center; gap:8px;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  font-family:var(--mono); font-size:12px; letter-spacing:.4px;
  transition:border-color .15s, background .15s, transform .08s;
}
#bird:active   { transform:scale(.96); }
#bird.busy     { cursor:default; opacity:.55; }
#bird.proc     { border-color:var(--green); background:#0b110d; }
#bird-icon     { font-size:16px; line-height:1; pointer-events:none; }
#bird-status   { margin-top:10px; font-size:11px; color:var(--mute); letter-spacing:.4px; min-height:14px; text-align:center; }

/* Test button for YAMNet — same styling as #bird, kept separate/removable
   until we decide whether it's worth folding into the main CLAP flow. */
#yamnet {
  margin-top:14px; padding:10px 22px; border-radius:20px;
  border:1.5px solid var(--bord); background:var(--card); color:var(--mute);
  display:flex; align-items:center; gap:8px;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  font-family:var(--mono); font-size:12px; letter-spacing:.4px;
  transition:border-color .15s, background .15s, transform .08s;
}
#yamnet:active   { transform:scale(.96); }
#yamnet.busy     { cursor:default; opacity:.55; }
#yamnet.proc     { border-color:var(--green); background:#0b110d; }
#yamnet-icon     { font-size:16px; line-height:1; pointer-events:none; }
#yamnet-status   { margin-top:10px; font-size:11px; color:var(--mute); letter-spacing:.4px; min-height:14px; text-align:center; }

/* Same as #yamnet but scores frames by peak instead of clip-average — better
   for brief/intermittent sounds (wind chimes, cicadas) that a mean dilutes. */
#yamnet-max {
  margin-top:14px; padding:10px 22px; border-radius:20px;
  border:1.5px solid var(--bord); background:var(--card); color:var(--mute);
  display:flex; align-items:center; gap:8px;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  font-family:var(--mono); font-size:12px; letter-spacing:.4px;
  transition:border-color .15s, background .15s, transform .08s;
}
#yamnet-max:active   { transform:scale(.96); }
#yamnet-max.busy     { cursor:default; opacity:.55; }
#yamnet-max.proc     { border-color:var(--green); background:#0b110d; }
#yamnet-max-icon     { font-size:16px; line-height:1; pointer-events:none; }
#yamnet-max-status   { margin-top:10px; font-size:11px; color:var(--mute); letter-spacing:.4px; min-height:14px; text-align:center; }

#result    { display:none; width:100%; max-width:380px; border:1px solid var(--bord); border-radius:10px; overflow:hidden; margin-top:32px; }
#result-pre { padding:18px 18px 14px; font-size:12.5px; line-height:1.85; color:#7a7a90; overflow-x:auto; white-space:pre; }
.k { color:#6888b0; } .s { color:#68b09a; } .n { color:#b0a068; } .p { color:var(--mute); }
#result-btns { display:flex; border-top:1px solid var(--bord); }
.cbtn {
  flex:1; padding:13px 0; background:transparent; border:none;
  border-right:1px solid var(--bord); color:var(--mute);
  font-size:11.5px; font-family:var(--mono); letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  transition:color .1s, background .1s;
}
.cbtn:last-child { border-right:none; }
.cbtn:active { background:#1a1a20; color:var(--text); }
.cbtn.ok { color:var(--green); }
</style>
</head>
<body>
<p class="eye">audio dump</p>
<div id="bird">
  <span id="bird-icon">🐦</span><span id="bird-lbl">bird id</span>
</div>
<div id="bird-status"></div>
<div id="yamnet">
  <span id="yamnet-icon">🌊</span><span id="yamnet-lbl">yamnet (test)</span>
</div>
<div id="yamnet-status"></div>
<div id="yamnet-max">
  <span id="yamnet-max-icon">🔔</span><span id="yamnet-max-lbl">yamnet (max)</span>
</div>
<div id="yamnet-max-status"></div>
<div id="result">
  <pre id="result-pre"></pre>
  <div id="result-btns">
    <button class="cbtn" id="btn-json">json</button>
    <button class="cbtn" id="btn-short">short</button>
    <button class="cbtn" id="btn-claude">claude</button>
  </div>
</div>

<script type="module">
// ── DOM ──────────────────────────────────────────────────────────────────
const resultEl = document.getElementById('result');
const resPre   = document.getElementById('result-pre');
const btnJson   = document.getElementById('btn-json');
const btnShort  = document.getElementById('btn-short');
const btnClaude = document.getElementById('btn-claude');

// Name of the iOS Shortcut this launches — must match exactly (spaces get
// URL-encoded below). The Shortcut itself reads whatever's on the clipboard
// (written by this button just before navigating), prepends GPS/street info,
// re-copies the combined text, then opens the Claude app.
const CLAUDE_SHORTCUT_NAME = 'Audio dump Claude';

let lastOut    = null;

const hhmm = () => {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
};

// ── Record ───────────────────────────────────────────────────────────────
async function recordAudio(targetSR, recordMs, labelEl = null) {
  const stream = await navigator.mediaDevices.getUserMedia({
    audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false },
    video:false
  });
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const ctx      = new AudioCtx();
  const source   = ctx.createMediaStreamSource(stream);

  // ScriptProcessor for capture, silenced
  const proc     = ctx.createScriptProcessor(4096, 1, 1);
  const silence  = ctx.createGain(); silence.gain.value = 0;
  const chunks   = [];
  proc.onaudioprocess = e => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  source.connect(proc); proc.connect(silence); silence.connect(ctx.destination);

  const end  = Date.now() + recordMs;
  const tick = setInterval(() => {
    if (labelEl) labelEl.textContent = Math.max(0, (end - Date.now()) / 1000).toFixed(1) + 's';
  }, 80);

  await new Promise(r => setTimeout(r, recordMs));
  clearInterval(tick);
  proc.disconnect(); silence.disconnect(); source.disconnect();
  stream.getTracks().forEach(t => t.stop());

  // Assemble
  const total = chunks.reduce((s,c) => s + c.length, 0);
  const raw   = new Float32Array(total);
  let off = 0; for (const c of chunks) { raw.set(c, off); off += c.length; }

  // Resample to target rate (iOS locks the AudioContext to 44100/48000)
  if (ctx.sampleRate !== targetSR) {
    const dstLen = Math.round(raw.length * targetSR / ctx.sampleRate);
    const offCtx = new OfflineAudioContext(1, dstLen, targetSR);
    const b = offCtx.createBuffer(1, raw.length, ctx.sampleRate);
    b.copyToChannel(raw, 0);
    const src = offCtx.createBufferSource();
    src.buffer = b; src.connect(offCtx.destination); src.start();
    const rendered = await offCtx.startRendering();
    await ctx.close();
    return rendered.getChannelData(0);
  }
  await ctx.close();
  return normalizeGain(raw);
}

// Peak-normalize each clip toward full scale. Walks are consistently distant/
// quiet with no observed clipping, so boosting every clip (rather than a flat
// multiplier) gets quiet/far sounds up where CLAP and BirdNET can actually
// use them. MAX_GAIN caps the boost so near-silent dead air doesn't get
// amplified into noise — without a cap, a clip that's mostly silence would
// see its tiny noise floor blown up to full scale.
const TARGET_PEAK = 0.9;
const MAX_GAIN     = 12;
function normalizeGain(samples) {
  let peak = 0;
  for (let i = 0; i < samples.length; i++) {
    const a = Math.abs(samples[i]);
    if (a > peak) peak = a;
  }
  if (peak < 1e-6) return samples; // true silence — nothing to normalize against
  const gain = Math.min(MAX_GAIN, TARGET_PEAK / peak);
  if (gain <= 1) return samples; // already loud enough, don't attenuate
  const out = new Float32Array(samples.length);
  for (let i = 0; i < samples.length; i++) out[i] = samples[i] * gain;
  return out;
}

// ── Result rendering (shared by ambient + bird results) ────────────────────
const enc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function renderResult(kind, key, ranked) {
  const ts = hhmm();
  lastOut = { ts, ranked, kind, key };
  const lines = [
    '<span class="p">{</span>',
    `  <span class="k">"ts"</span><span class="p">:</span> <span class="s">"${ts}"</span><span class="p">,</span>`,
    `  <span class="k">"${key}"</span><span class="p">: [</span>`,
    ...ranked.map((d,i) => {
      const comma = i < ranked.length - 1 ? '<span class="p">,</span>' : '';
      return `    <span class="p">{</span> <span class="k">"label"</span><span class="p">:</span> <span class="s">"${enc(d.label)}"</span><span class="p">,</span> <span class="k">"conf"</span><span class="p">:</span> <span class="n">${Math.round(d.score * 100)}</span> <span class="p">}</span>${comma}`;
    }),
    '  <span class="p">]</span>',
    '<span class="p">}</span>'
  ];
  resPre.innerHTML = lines.join('\n');
  resultEl.style.display = 'block';
}

// ── Copy ─────────────────────────────────────────────────────────────────
function doCopy(text, btn, label) {
  navigator.clipboard.writeText(text)
    .then(() => { btn.textContent = '✓ copied'; btn.classList.add('ok'); setTimeout(() => { btn.textContent = label; btn.classList.remove('ok'); }, 1600); })
    .catch(console.error);
}
function copyJSON() {
  if (!lastOut) return;
  const obj = { ts: lastOut.ts, [lastOut.key]: lastOut.ranked.map(d => ({ label: d.label, conf: Math.round(d.score * 100) })) };
  doCopy(JSON.stringify(obj, null, 2), btnJson, 'json');
}
function copyShort() {
  if (!lastOut) return;
  const icon = lastOut.kind === 'bird' ? '🐦' : '🌊';
  const body = lastOut.ranked.length
    ? lastOut.ranked.map(d => `${d.label} (${Math.round(d.score * 100)}%)`).join(' · ')
    : 'no confident signal';
  doCopy(`${icon} ${lastOut.ts} | ${body}`, btnShort, 'short');
}

// Copy the short-form summary to the clipboard, then hand off to the
// "Audio dump Claude" Shortcut, which reads the clipboard, appends GPS/street
// info, and opens Claude. The navigation must happen inside this click
// handler (a real user gesture) or iOS will block the shortcuts:// scheme.
// A short delay after the clipboard write gives it time to actually land
// before Shortcuts reads it — writeText() resolving doesn't always mean the
// OS-level clipboard is fully settled before an immediate scheme navigation.
function sendToClaude() {
  if (!lastOut) return;
  const icon = lastOut.kind === 'bird' ? '🐦' : '🌊';
  const body = lastOut.ranked.length
    ? lastOut.ranked.map(d => `${d.label} (${Math.round(d.score * 100)}%)`).join(' · ')
    : 'no confident signal';
  const text = `${icon} ${lastOut.ts} | ${body}`;

  navigator.clipboard.writeText(text)
    .then(() => {
      btnClaude.textContent = '→ claude'; btnClaude.classList.add('ok');
      setTimeout(() => {
        window.location.href = 'shortcuts://run-shortcut?name=' + encodeURIComponent(CLAUDE_SHORTCUT_NAME);
        setTimeout(() => { btnClaude.textContent = 'claude'; btnClaude.classList.remove('ok'); }, 1200);
      }, 150);
    })
    .catch(console.error);
}

// ── BirdNET (species ID) ────────────────────────────────────────────────
// Model + custom MelSpec/STFT kernel adapted from georg95/birdnet-web
// (Cornell Lab of Ornithology BirdNET, CC BY-NC-SA 4.0)
const BIRD_BASE   = 'https://cdn.jsdelivr.net/gh/georg95/birdnet-web@main/models/birdnet';
const BIRD_SR     = 48000;
const BIRD_MS     = 3000;
const BIRD_LEN    = 144000; // 3s @ 48kHz, fixed input shape the model expects
const BIRD_MIN_CONF = 0.08;
const BIRD_TOP_N  = 5;

const birdBtn    = document.getElementById('bird');
const birdIcon   = document.getElementById('bird-icon');
const birdLbl    = document.getElementById('bird-lbl');
const birdStatus = document.getElementById('bird-status');
const setBirdStatus = s => { birdStatus.textContent = s; };

let birdReady  = false;
let birdBusy   = false;
let birdModel  = null;
let birdLabels = null;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = () => reject(new Error('failed to load ' + src));
    document.head.appendChild(s);
  });
}

function registerBirdNetKernels(tf) {
  class MelSpecLayerSimple extends tf.layers.Layer {
    constructor(config) {
      super(config);
      this.sampleRate    = config.sampleRate;
      this.specShape     = config.specShape;
      this.frameStep     = config.frameStep;
      this.frameLength   = config.frameLength;
      this.melFilterbank = tf.tensor2d(config.melFilterbank);
    }
    build(inputShape) {
      this.magScale = this.addWeight('magnitude_scaling', [], 'float32', tf.initializers.constant({ value: 1.23 }));
      super.build(inputShape);
    }
    computeOutputShape(inputShape) { return [inputShape[0], this.specShape[0], this.specShape[1], 1]; }
    call(inputs) {
      return tf.tidy(() => {
        inputs = inputs[0];
        return tf.stack(inputs.split(inputs.shape[0]).map((input) => {
          let spec = input.squeeze();
          spec = tf.sub(spec, tf.min(spec, -1, true));
          spec = tf.div(spec, tf.max(spec, -1, true).add(0.000001));
          spec = tf.sub(spec, 0.5);
          spec = tf.mul(spec, 2.0);
          spec = tf.engine().runKernel('STFT', { signal: spec, frameLength: this.frameLength, frameStep: this.frameStep });
          spec = tf.matMul(spec, this.melFilterbank);
          spec = spec.pow(2.0);
          spec = spec.pow(tf.div(1.0, tf.add(1.0, tf.exp(this.magScale.read()))));
          spec = tf.reverse(spec, -1);
          spec = tf.transpose(spec);
          spec = spec.expandDims(-1);
          return spec;
        }));
      });
    }
    static get className() { return 'MelSpecLayerSimple'; }
  }
  tf.serialization.registerClass(MelSpecLayerSimple);

  // WebGL radix-2 real FFT, copied verbatim from georg95/birdnet-web (birdnet.js)
  tf.registerKernel({
    kernelName: 'STFT', backendName: 'webgl',
    kernelFunc: ({ backend, inputs: { signal, frameLength, frameStep } }) => {
      const innerDim = frameLength / 2;
      const batch = (signal.size - frameLength + frameStep) / frameStep | 0;
      let currentTensor = backend.runWebGLProgram({
        variableNames: ['x'], outputShape: [batch, frameLength],
        userCode: `
        void main() {
            ivec2 coords = getOutputCoords();
            int p = coords[1] % ${innerDim};
            int k = 0;
            for (int i = 0; i < ${Math.log2(innerDim)}; ++i) {
                if ((p & (1 << i)) != 0) { k |= (1 << (${Math.log2(innerDim) - 1} - i)); }
            }
            int i = 2 * k;
            if (coords[1] >= ${innerDim}) {
                i = 2 * (k % ${innerDim}) + 1;
            }
            int q = coords[0] * ${frameLength} + i;
            float val = getX((q / ${frameLength}) * ${frameStep} + q % ${frameLength});
            float cosArg = ${2.0 * Math.PI / frameLength} * float(q);
            float mul = 0.5 - 0.5 * cos(cosArg);
            setOutput(val * mul);
        }`
      }, [signal], 'float32');
      for (let len = 1; len < innerDim; len *= 2) {
        let prevTensor = currentTensor;
        currentTensor = backend.runWebGLProgram({
          variableNames: ['x'], outputShape: [batch, innerDim * 2],
          userCode: `void main() {
              ivec2 coords = getOutputCoords();
              int batch = coords[0];
              int i = coords[1];
              int k = i % ${innerDim};
              int isHigh = (k % ${len * 2}) / ${len};
              int highSign = (1 - isHigh * 2);
              int baseIndex = k - isHigh * ${len};
              float t = ${Math.PI / len} * float(k % ${len});
              float a = cos(t);
              float b = sin(-t);
              float oddK_re = getX(batch, baseIndex + ${len});
              float oddK_im = getX(batch, baseIndex + ${len + innerDim});
              if (i < ${innerDim}) {
                  float evenK_re = getX(batch, baseIndex);
                  setOutput(evenK_re + (oddK_re * a - oddK_im * b) * float(highSign));
              } else {
                  float evenK_im = getX(batch, baseIndex + ${innerDim});
                  setOutput(evenK_im + (oddK_re * b + oddK_im * a) * float(highSign));
              }
          }`
        }, [currentTensor], 'float32');
        backend.disposeIntermediateTensorInfo(prevTensor);
      }
      const real = backend.runWebGLProgram({
        variableNames: ['x'], outputShape: [batch, innerDim + 1],
        userCode: `void main() {
            ivec2 coords = getOutputCoords();
            int batch = coords[0];
            int i = coords[1];
            int zI = i % ${innerDim};
            int conjI = (${innerDim} - i) % ${innerDim};
            float Zk0 = getX(batch, zI);
            float Zk1 = getX(batch, zI+${innerDim});
            float Zk_conj0 = getX(batch, conjI);
            float Zk_conj1 = -getX(batch, conjI+${innerDim});
            float t = ${-2 * Math.PI} * float(i) / float(${innerDim * 2});
            float diff0 = Zk0 - Zk_conj0;
            float diff1 = Zk1 - Zk_conj1;
            float result = (Zk0 + Zk_conj0 + cos(t) * diff1 + sin(t) * diff0) * 0.5;
            setOutput(result);
        }`
      }, [currentTensor], 'float32');
      backend.disposeIntermediateTensorInfo(currentTensor);
      return real;
    }
  });
}

async function ensureBirdModel() {
  if (birdReady) return;
  setBirdStatus('loading tensorflow.js…');
  await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4/dist/tf.min.js');
  const tf = window.tf;
  await tf.setBackend('webgl');
  await tf.ready();
  registerBirdNetKernels(tf);

  setBirdStatus('downloading bird model (~50MB, first time only)…');
  birdModel = await tf.loadLayersModel(`${BIRD_BASE}/model.json`);

  setBirdStatus('loading species labels…');
  const raw = await fetch(`${BIRD_BASE}/labels/en_us.txt`).then(r => r.text());
  birdLabels = raw.split('\n').map(l => { const p = l.split('_'); return p[1] || p[0]; }).filter(Boolean);

  setBirdStatus('warming up…');
  tf.tidy(() => birdModel.predict(tf.zeros([1, BIRD_LEN])).dataSync());

  birdReady = true;
  setBirdStatus('');
}

async function classifyBird(samples) {
  const tf = window.tf;
  // Pad or trim to exactly 144000 samples (3s @ 48kHz) — fixed model input shape
  let fixed = samples;
  if (fixed.length !== BIRD_LEN) {
    const padded = new Float32Array(BIRD_LEN);
    padded.set(fixed.subarray(0, Math.min(fixed.length, BIRD_LEN)));
    fixed = padded;
  }
  const scores = tf.tidy(() => birdModel.predict(tf.tensor(fixed, [1, BIRD_LEN])).dataSync());
  const out = [];
  for (let i = 0; i < scores.length && i < birdLabels.length; i++) {
    if (scores[i] >= BIRD_MIN_CONF) out.push({ label: birdLabels[i], score: scores[i] });
  }
  out.sort((a, b) => b.score - a.score);
  return out.slice(0, BIRD_TOP_N);
}

async function handleBirdTap() {
  if (birdBusy) return;
  birdBusy = true;
  birdBtn.classList.add('busy');
  resultEl.style.display = 'none';

  try {
    await ensureBirdModel();
    birdBtn.classList.add('proc');
    birdIcon.textContent = '⏺'; birdLbl.textContent = 'listening…';
    setBirdStatus('recording 3s @ 48kHz…');

    const audio = await recordAudio(BIRD_SR, BIRD_MS, birdLbl);
    birdIcon.textContent = '⚙️'; birdLbl.textContent = 'identifying…';
    setBirdStatus('running inference…');

    const ranked = await classifyBird(audio);
    if (ranked.length) {
      renderResult('bird', 'species', ranked);
      setBirdStatus('done');
    } else {
      setBirdStatus('no confident match');
    }
  } catch (e) {
    setBirdStatus('error — ' + e.message);
    console.error(e);
  }

  birdBtn.classList.remove('busy','proc');
  birdIcon.textContent = '🐦'; birdLbl.textContent = 'bird id';
  birdBusy = false;
}

// ── YAMNet (env tap) ─────────────────────────────────────────────────────
// Google's AudioSet-trained classifier, 521 fixed classes. Replaced the old
// CLAP zero-shot env tap: CLAP's forced comparison against a small curated
// label pool needed heavy restraint (confidence floors, escape-valve labels)
// to avoid false positives, and still over-triggered on things like water
// sounds. YAMNet's classes are independent (not summing to ~100%) and cover
// specific categories the CLAP pool didn't (e.g. "Cicada", "Wind chime").
//
// NOTE: this is a first pass, untested against the live model — the TF Hub
// graph model's exact input/output tensor names can vary by conversion.
// If ensureYamnetModel()/classifyYamnet() throws on the first real tap,
// check the error against the model's actual signature (log
// yamnetModel.inputs / yamnetModel.outputs to inspect) and adjust the
// execute() call below accordingly.
const YAMNET_TFHUB_URL   = 'https://tfhub.dev/google/tfjs-model/yamnet/tfjs/1';
const YAMNET_CLASSMAP_URL = 'https://raw.githubusercontent.com/tensorflow/models/master/research/audioset/yamnet/yamnet_class_map.csv';
const YAMNET_SR       = 16000; // YAMNet's expected input rate
const YAMNET_MS       = 4000; // 4s clip length
const YAMNET_MIN_CONF = 0.15; // AudioSet classes are independent, not a forced pool — tune after real taps
const YAMNET_TOP_N    = 5;

const yamnetBtn    = document.getElementById('yamnet');
const yamnetIcon   = document.getElementById('yamnet-icon');
const yamnetLbl    = document.getElementById('yamnet-lbl');
const yamnetStatus = document.getElementById('yamnet-status');
const setYamnetStatus = s => { yamnetStatus.textContent = s; };

const yamnetMaxBtn    = document.getElementById('yamnet-max');
const yamnetMaxIcon   = document.getElementById('yamnet-max-icon');
const yamnetMaxLbl    = document.getElementById('yamnet-max-lbl');
const yamnetMaxStatus = document.getElementById('yamnet-max-status');
const setYamnetMaxStatus = s => { yamnetMaxStatus.textContent = s; };
let yamnetMaxBusy = false;

let yamnetReady  = false;
let yamnetModel  = null;
let yamnetLabels = null;

// Minimal CSV parser — handles the one quoted/comma-containing display_name
// case in the class map (e.g. "Bell, chime, ...") without pulling in a lib.
function parseCsvLine(line) {
  const out = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuotes = !inQuotes; }
    else if (c === ',' && !inQuotes) { out.push(cur); cur = ''; }
    else { cur += c; }
  }
  out.push(cur);
  return out;
}

async function ensureYamnetModel() {
  if (yamnetReady) return;
  setYamnetStatus('loading tensorflow.js…');
  // Reuse tfjs if BirdNET already loaded it on this page load
  if (!window.tf) {
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4/dist/tf.min.js');
  }
  const tf = window.tf;
  if (!tf.getBackend()) { await tf.setBackend('webgl'); }
  await tf.ready();

  setYamnetStatus('downloading YAMNet (~17MB, first time only)…');
  yamnetModel = await tf.loadGraphModel(YAMNET_TFHUB_URL, { fromTFHub: true });

  setYamnetStatus('loading class map…');
  const csvText = await fetch(YAMNET_CLASSMAP_URL).then(r => r.text());
  yamnetLabels = csvText.trim().split('\n').slice(1) // drop header row
    .map(line => parseCsvLine(line)[2]) // columns: index,mid,display_name
    .filter(Boolean);

  setYamnetStatus('warming up…');
  tf.tidy(() => {
    const out = yamnetModel.execute(tf.zeros([YAMNET_SR])); // ~1s dummy clip
    (Array.isArray(out) ? out : [out]).forEach(t => t.dataSync());
  });

  yamnetReady = true;
  setYamnetStatus('');
}

async function classifyYamnet(samples, agg = 'mean') {
  const tf = window.tf;
  return tf.tidy(() => {
    const input = tf.tensor1d(samples);
    const out = yamnetModel.execute(input);
    // Graph model may return a single scores tensor or [scores, embeddings, spectrogram]
    const scoresT = Array.isArray(out) ? out[0] : out;
    // 'mean' averages per-frame scores across the clip (dilutes brief/intermittent
    // sounds like wind chimes or cicadas). 'max' takes each class's peak frame
    // score instead, so a sound only needs to be confident in one ~0.96s frame.
    const aggScores = agg === 'max' ? scoresT.max(0) : scoresT.mean(0);
    const scores = aggScores.dataSync();
    const ranked = [];
    for (let i = 0; i < scores.length && i < yamnetLabels.length; i++) {
      if (scores[i] >= YAMNET_MIN_CONF) ranked.push({ label: yamnetLabels[i], score: scores[i] });
    }
    return ranked.sort((a, b) => b.score - a.score).slice(0, YAMNET_TOP_N);
  });
}

// Shared by both env-tap buttons; `agg` selects mean (clip-average, the
// original behavior) vs max (peak-frame, better for brief/intermittent
// sounds like wind chimes or cicadas — see classifyYamnet).
async function runYamnetTap({ agg, btn, icon, lbl, setStatus, idleIcon, idleLbl, resultKey, busyFlagSet }) {
  if (busyFlagSet.busy) return;
  busyFlagSet.busy = true;
  btn.classList.add('busy');
  resultEl.style.display = 'none';

  try {
    await ensureYamnetModel();
    btn.classList.add('proc');
    icon.textContent = '⏺'; lbl.textContent = 'listening…';
    setStatus(`recording ${YAMNET_MS/1000}s @ ${YAMNET_SR/1000}kHz…`);

    const audio = await recordAudio(YAMNET_SR, YAMNET_MS, lbl);
    icon.textContent = '⚙️'; lbl.textContent = 'identifying…';
    setStatus('running inference…');

    const ranked = await classifyYamnet(audio, agg);
    if (ranked.length) {
      renderResult(resultKey, resultKey, ranked);
      setStatus('done');
    } else {
      setStatus('no confident match');
    }
  } catch (e) {
    setStatus('error — ' + e.message);
    console.error(e);
  }

  btn.classList.remove('busy','proc');
  icon.textContent = idleIcon; lbl.textContent = idleLbl;
  busyFlagSet.busy = false;
}

const yamnetBusyFlag    = { busy: false };
const yamnetMaxBusyFlag = { busy: false };

function handleYamnetTap() {
  return runYamnetTap({
    agg: 'mean', btn: yamnetBtn, icon: yamnetIcon, lbl: yamnetLbl, setStatus: setYamnetStatus,
    idleIcon: '🌊', idleLbl: 'yamnet (test)', resultKey: 'yamnet', busyFlagSet: yamnetBusyFlag,
  });
}

function handleYamnetMaxTap() {
  return runYamnetTap({
    agg: 'max', btn: yamnetMaxBtn, icon: yamnetMaxIcon, lbl: yamnetMaxLbl, setStatus: setYamnetMaxStatus,
    idleIcon: '🔔', idleLbl: 'yamnet (max)', resultKey: 'yamnet_max', busyFlagSet: yamnetMaxBusyFlag,
  });
}

// ── Wire up ──────────────────────────────────────────────────────────────
btnJson.addEventListener('click', copyJSON);
btnShort.addEventListener('click', copyShort);
btnClaude.addEventListener('click', sendToClaude);
birdBtn.addEventListener('click', handleBirdTap);
yamnetBtn.addEventListener('click', handleYamnetTap);
yamnetMaxBtn.addEventListener('click', handleYamnetMaxTap);
</script>
