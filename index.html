<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>audio dump</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #0a0a0c;
  --card:  #131317;
  --bord:  #1f1f27;
  --green: #4ade80;
  --red:   #ef4444;
  --text:  #c0c0cc;
  --mute:  #40404c;
  --mono:  'SF Mono','Fira Code','Cascadia Code',ui-monospace,monospace;
}
html { height:100%; }
body { min-height:100%; overflow-y:auto; background:var(--bg); color:var(--text); font-family:var(--mono); display:flex; flex-direction:column; align-items:center; padding:52px 20px 56px; }
.eye { font-size:10px; letter-spacing:5px; text-transform:uppercase; color:var(--mute); margin-bottom:44px; }

#tap {
  width:188px; height:188px; border-radius:50%;
  border:1.5px solid var(--bord); background:var(--card);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  transition:border-color .15s, background .15s, transform .08s;
  position:relative; overflow:hidden;
}
#tap:not(.busy):active { transform:scale(.95); }
#tap.busy  { cursor:default; }
#tap.rec   { border-color:var(--red);   background:#130c0c; }
#tap.proc  { border-color:var(--green); background:#0b110d; }
#tap-icon  { font-size:46px; line-height:1; pointer-events:none; }
#tap-lbl   { font-size:13px; color:var(--mute); pointer-events:none; }
#wave      { position:absolute; bottom:0; left:0; right:0; height:42px; display:none; }

#load-bar  { width:188px; height:1.5px; background:var(--bord); margin-top:18px; display:none; overflow:hidden; }
#load-fill { height:100%; width:0%; background:var(--green); transition:width .4s ease; }
#status    { margin-top:12px; font-size:11px; color:var(--mute); letter-spacing:.4px; min-height:16px; text-align:center; }

#bird {
  margin-top:22px; padding:10px 22px; border-radius:20px;
  border:1.5px solid var(--bord); background:var(--card); color:var(--mute);
  display:flex; align-items:center; gap:8px;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  font-family:var(--mono); font-size:12px; letter-spacing:.4px;
  transition:border-color .15s, background .15s, transform .08s;
}
#bird:active   { transform:scale(.96); }
#bird.busy     { cursor:default; opacity:.55; }
#bird.proc     { border-color:var(--green); background:#0b110d; }
#bird-icon     { font-size:16px; line-height:1; pointer-events:none; }
#bird-status   { margin-top:10px; font-size:11px; color:var(--mute); letter-spacing:.4px; min-height:14px; text-align:center; }

/* Test button for YAMNet — same styling as #bird, kept separate/removable
   until we decide whether it's worth folding into the main CLAP flow. */
#yamnet {
  margin-top:14px; padding:10px 22px; border-radius:20px;
  border:1.5px solid var(--bord); background:var(--card); color:var(--mute);
  display:flex; align-items:center; gap:8px;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  font-family:var(--mono); font-size:12px; letter-spacing:.4px;
  transition:border-color .15s, background .15s, transform .08s;
}
#yamnet:active   { transform:scale(.96); }
#yamnet.busy     { cursor:default; opacity:.55; }
#yamnet.proc     { border-color:var(--green); background:#0b110d; }
#yamnet-icon     { font-size:16px; line-height:1; pointer-events:none; }
#yamnet-status   { margin-top:10px; font-size:11px; color:var(--mute); letter-spacing:.4px; min-height:14px; text-align:center; }

#result    { display:none; width:100%; max-width:380px; border:1px solid var(--bord); border-radius:10px; overflow:hidden; margin-top:32px; }
#result-pre { padding:18px 18px 14px; font-size:12.5px; line-height:1.85; color:#7a7a90; overflow-x:auto; white-space:pre; }
.k { color:#6888b0; } .s { color:#68b09a; } .n { color:#b0a068; } .p { color:var(--mute); }
#result-btns { display:flex; border-top:1px solid var(--bord); }
.cbtn {
  flex:1; padding:13px 0; background:transparent; border:none;
  border-right:1px solid var(--bord); color:var(--mute);
  font-size:11.5px; font-family:var(--mono); letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  transition:color .1s, background .1s;
}
.cbtn:last-child { border-right:none; }
.cbtn:active { background:#1a1a20; color:var(--text); }
.cbtn.ok { color:var(--green); }
</style>
</head>
<body>
<p class="eye">audio dump</p>
<div id="tap" class="busy">
  <canvas id="wave" width="188" height="42"></canvas>
  <span id="tap-icon">🎙</span>
  <span id="tap-lbl">loading…</span>
</div>
<div id="load-bar"><div id="load-fill"></div></div>
<div id="status">initializing</div>
<div id="bird">
  <span id="bird-icon">🐦</span><span id="bird-lbl">bird id</span>
</div>
<div id="bird-status"></div>
<div id="yamnet">
  <span id="yamnet-icon">🌊</span><span id="yamnet-lbl">yamnet (test)</span>
</div>
<div id="yamnet-status"></div>
<div id="result">
  <pre id="result-pre"></pre>
  <div id="result-btns">
    <button class="cbtn" id="btn-json">json</button>
    <button class="cbtn" id="btn-short">short</button>
  </div>
</div>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

env.allowLocalModels = false;
env.useBrowserCache  = true;

// ── Config ────────────────────────────────────────────────────────────────
// Swapped from AST/AudioSet (open 527-label closed-set classifier) to CLAP
// zero-shot audio classification. Instead of the model returning its own
// labels from a fixed noisy ontology, we supply the exact candidate list
// below and CLAP scores audio-vs-text similarity for each — a forced
// comparison among ONLY these options (scores sum to ~100%, not independent).
const MODEL      = 'Xenova/clap-htsat-unfused';
const RECORD_MS  = 4000;
const TARGET_SR  = 48000; // CLAP's expected input rate
const TOP_N      = 5;

// Candidate labels for zero-shot comparison. Bird categories are deliberately
// excluded — BirdNET already owns that and shouldn't compete/double-log here.
// The two "escape valve" labels at the end give the forced comparison a
// legitimate place to land when nothing else fits; without them CLAP will
// confidently mislabel unrelated sounds as whichever candidate is closest.
const ENV_LABELS = [
  'a car engine or vehicle passing',
  'nearby traffic noise',
  'distant traffic noise',
  'a helicopter overhead',
  'people talking nearby',
  'construction or power tools',
  'a dog barking',
  'live music or a musical instrument',
  'wind blowing into a microphone',
  'running water or a creek',
  'insects buzzing',
  'cicadas droning loudly',
  'rustling leaves or branches',
  'rain falling',
  'a truck backing up with a beeping alarm',
  'building ventilation or HVAC hum',
  'unclear or ambient background noise',
  'silence or very quiet background',
];

// Escape-valve labels: legitimate "nothing else fit" outcomes. Excluded from
// delta added/dropped/streak tracking and from the copy-out JSON's "confident"
// filtering, since winning against the pool isn't the same as a real detection.
const ESCAPE_LABELS = new Set([
  'unclear or ambient background noise',
  'silence or very quiet background',
]);

// Labels that are known blind spots: distant/reverberant human vocalizations
// (kids, shouts, echo tails) can land on "a dog barking" since CLAP is
// comparing against a small fixed pool. Only suppressed when VAD independently
// confirms vocal energy is present — unsuppressed elsewhere, so a real dog
// bark on a quiet trail still logs.
const ANIMAL_VOCAL_CONFUSABLE = new Set(['a dog barking']);
// Fraction of the clip VAD must flag as speech before we trust it enough to gate.
const VAD_SPEECH_FRAC_THRESHOLD = 0.15;

// ── DOM ──────────────────────────────────────────────────────────────────
const tap      = document.getElementById('tap');
const tapIcon  = document.getElementById('tap-icon');
const tapLbl   = document.getElementById('tap-lbl');
const waveEl   = document.getElementById('wave');
const waveCtx  = waveEl.getContext('2d');
const loadBar  = document.getElementById('load-bar');
const loadFill = document.getElementById('load-fill');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const resPre   = document.getElementById('result-pre');
const btnJson  = document.getElementById('btn-json');
const btnShort = document.getElementById('btn-short');

let classifier = null;
let ready      = false;
let lastOut    = null;
let waveRAF    = null;

// Delta tracking — env taps only, in-memory for this session
let prevEnv     = null;   // [{label, score}] from the previous env tap
let envStreaks  = {};     // label -> consecutive tap count it's appeared in
let prevEnvTime = null;   // Date.now() of the previous env tap
// CLAP scores are relative (sum to ~100% across the candidate pool), not
// independent per-label probabilities like AST — so the floor needs to sit
// well above the ~1/14 uniform baseline (~7%) to mean anything. Tune this
// empirically once you've run it on a few real walks.
const DELTA_MIN_CONF = 0.20;
// Lower floor used only for the copy-out (JSON/short) — since we're scoring
// against our own curated label pool now (not an open vocabulary), even
// sub-DELTA_MIN_CONF labels are meaningful hypotheses, not noise. Set just
// above the ~7% uniform baseline for a ~14-label CLAP pool, so a genuinely
// flat/uninformative spread still falls back to "no confident signal."
const COPY_MIN_CONF = 0.08;

const setStatus = s => { statusEl.textContent = s; };
const setProgress = pct => {
  loadBar.style.display = 'block';
  loadFill.style.width = pct + '%';
  if (pct >= 100) setTimeout(() => { loadBar.style.display = 'none'; }, 500);
};
const hhmm = () => {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
};

// ── Waveform viz ─────────────────────────────────────────────────────────
function startWave(analyser) {
  waveEl.style.display = 'block';
  const bins = new Uint8Array(analyser.frequencyBinCount);
  const W = 188, H = 42, BARS = 14, gap = 3;
  const bw = (W - gap * (BARS - 1)) / BARS;
  function draw() {
    analyser.getByteFrequencyData(bins);
    waveCtx.clearRect(0, 0, W, H);
    for (let i = 0; i < BARS; i++) {
      const v = bins[i] / 255;
      const h = Math.max(3, v * H);
      waveCtx.fillStyle = `rgba(239,68,68,${0.4 + v * 0.6})`;
      waveCtx.beginPath();
      waveCtx.roundRect(i * (bw + gap), H - h, bw, h, 2);
      waveCtx.fill();
    }
    waveRAF = requestAnimationFrame(draw);
  }
  draw();
}
function stopWave() {
  if (waveRAF) cancelAnimationFrame(waveRAF);
  waveRAF = null;
  waveEl.style.display = 'none';
  waveCtx.clearRect(0, 0, 188, 42);
}

// ── WAV encoder ──────────────────────────────────────────────────────────
function pcmToWav(samples, sr) {
  const dataLen = samples.length * 2;
  const buf     = new ArrayBuffer(44 + dataLen);
  const v       = new DataView(buf);
  const s = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
  s(0,'RIFF'); v.setUint32(4, 36 + dataLen, true);
  s(8,'WAVE'); s(12,'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, 1, true);  v.setUint32(24, sr, true);
  v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); s(36,'data');
  v.setUint32(40, dataLen, true);
  for (let i = 0; i < samples.length; i++) {
    const x = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, x * (x < 0 ? 32768 : 32767), true);
  }
  return new Blob([buf], { type:'audio/wav' });
}

// ── Init ─────────────────────────────────────────────────────────────────
async function init() {
  setProgress(5);
  try {
    setStatus('loading model (first run — larger download, then cached)…');
    classifier = await pipeline('zero-shot-audio-classification', MODEL, {
      progress_callback: info => {
        if (info.status === 'progress' && info.total) {
          const pct = Math.round((info.loaded / info.total) * 70) + 10;
          setProgress(pct);
          setStatus(`downloading model… ${Math.round(info.loaded/1e6)}MB / ${Math.round(info.total/1e6)}MB`);
        }
      }
    });
    setProgress(100);
    ready = true;
    tap.classList.remove('busy');
    tapLbl.textContent = 'tap to record';
    setStatus('');
  } catch(e) {
    setStatus('load failed — ' + e.message);
    tapLbl.textContent = 'error';
    console.error(e);
  }
}

// ── Record ───────────────────────────────────────────────────────────────
async function recordAudio(targetSR = TARGET_SR, recordMs = RECORD_MS, labelEl = tapLbl) {
  const stream = await navigator.mediaDevices.getUserMedia({
    audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false },
    video:false
  });
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const ctx      = new AudioCtx();
  const source   = ctx.createMediaStreamSource(stream);

  // Analyser for viz (only meaningful on the main button, harmless otherwise)
  const analyser  = ctx.createAnalyser(); analyser.fftSize = 64;
  source.connect(analyser);
  if (labelEl === tapLbl) startWave(analyser);

  // ScriptProcessor for capture, silenced
  const proc     = ctx.createScriptProcessor(4096, 1, 1);
  const silence  = ctx.createGain(); silence.gain.value = 0;
  const chunks   = [];
  proc.onaudioprocess = e => chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  source.connect(proc); proc.connect(silence); silence.connect(ctx.destination);

  const end  = Date.now() + recordMs;
  const tick = setInterval(() => {
    if (labelEl) labelEl.textContent = Math.max(0, (end - Date.now()) / 1000).toFixed(1) + 's';
  }, 80);

  await new Promise(r => setTimeout(r, recordMs));
  clearInterval(tick);
  if (labelEl === tapLbl) stopWave();
  proc.disconnect(); silence.disconnect(); source.disconnect();
  stream.getTracks().forEach(t => t.stop());

  // Assemble
  const total = chunks.reduce((s,c) => s + c.length, 0);
  const raw   = new Float32Array(total);
  let off = 0; for (const c of chunks) { raw.set(c, off); off += c.length; }

  // Resample to target rate (iOS locks the AudioContext to 44100/48000)
  if (ctx.sampleRate !== targetSR) {
    const dstLen = Math.round(raw.length * targetSR / ctx.sampleRate);
    const offCtx = new OfflineAudioContext(1, dstLen, targetSR);
    const b = offCtx.createBuffer(1, raw.length, ctx.sampleRate);
    b.copyToChannel(raw, 0);
    const src = offCtx.createBufferSource();
    src.buffer = b; src.connect(offCtx.destination); src.start();
    const rendered = await offCtx.startRendering();
    await ctx.close();
    return rendered.getChannelData(0);
  }
  await ctx.close();
  return normalizeGain(raw);
}

// Peak-normalize each clip toward full scale. Walks are consistently distant/
// quiet with no observed clipping, so boosting every clip (rather than a flat
// multiplier) gets quiet/far sounds up where CLAP and BirdNET can actually
// use them. MAX_GAIN caps the boost so near-silent dead air doesn't get
// amplified into noise — without a cap, a clip that's mostly silence would
// see its tiny noise floor blown up to full scale.
const TARGET_PEAK = 0.9;
const MAX_GAIN     = 12;
function normalizeGain(samples) {
  let peak = 0;
  for (let i = 0; i < samples.length; i++) {
    const a = Math.abs(samples[i]);
    if (a > peak) peak = a;
  }
  if (peak < 1e-6) return samples; // true silence — nothing to normalize against
  const gain = Math.min(MAX_GAIN, TARGET_PEAK / peak);
  if (gain <= 1) return samples; // already loud enough, don't attenuate
  const out = new Float32Array(samples.length);
  for (let i = 0; i < samples.length; i++) out[i] = samples[i] * gain;
  return out;
}

// ── Classify ─────────────────────────────────────────────────────────────
async function classify(audio, suppressConfusables = false) {
  const wavBlob = pcmToWav(audio, TARGET_SR);
  const wavUrl  = URL.createObjectURL(wavBlob);
  try {
    let ranked = await classifier(wavUrl, ENV_LABELS);
    if (suppressConfusables) {
      ranked = ranked.filter(x => !ANIMAL_VOCAL_CONFUSABLE.has(x.label));
    }
    return ranked.sort((a, b) => b.score - a.score).slice(0, TOP_N);
  } finally {
    URL.revokeObjectURL(wavUrl);
  }
}

// ── VAD (voice activity detection) ──────────────────────────────────────
// Silero VAD via @ricky0123/vad-web, run non-realtime against the already-
// captured clip. Used only to gate ANIMAL_VOCAL_CONFUSABLE labels above —
// this is not logged as its own signal, just a filter on the env classifier.
const VAD_ORT_BASE = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/';
const VAD_ASSET_BASE = 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/';

let vadReady    = false;
let vadInstance = null;
let vadLoading  = null; // in-flight promise, avoids double-init on rapid taps

async function ensureVAD() {
  if (vadReady) return;
  if (vadLoading) return vadLoading;
  vadLoading = (async () => {
    await loadScript(VAD_ORT_BASE + 'ort.wasm.min.js');
    await loadScript(VAD_ASSET_BASE + 'bundle.min.js');
    vadInstance = await window.vad.NonRealTimeVAD.new({
      onnxWASMBasePath: VAD_ORT_BASE,
      baseAssetPath: VAD_ASSET_BASE,
    });
    vadReady = true;
  })();
  return vadLoading;
}

// Returns the fraction (0-1) of the clip VAD considers speech. Fails open
// (returns 0 → no suppression) if the model can't load, so a VAD outage
// never blocks the core env-tap flow.
async function speechFraction(audio) {
  try {
    await ensureVAD();
    let speechMs = 0;
    for await (const { start, end } of vadInstance.run(audio, TARGET_SR)) {
      speechMs += (end - start);
    }
    const totalMs = (audio.length / TARGET_SR) * 1000;
    return totalMs > 0 ? speechMs / totalMs : 0;
  } catch (e) {
    console.error('VAD error (failing open, no suppression):', e);
    return 0;
  }
}

// ── Delta (env taps only) ───────────────────────────────────────────────
// Compares this tap's tags against the previous env tap: what's new, what
// dropped off, and what's persisting (with a streak count + confidence
// drift). This is what lets a single tap read as a moment in a sequence
// rather than an isolated snapshot.
function computeDelta(ranked) {
  const isFirst    = prevEnv === null;
  const now        = Date.now();
  const secsSince  = prevEnvTime !== null ? Math.round((now - prevEnvTime) / 1000) : null;

  // Only labels clearing the confidence floor count as real detections for
  // diffing purposes — below that it's the model grasping at noise, not signal.
  const confident   = ranked.filter(d => d.score >= DELTA_MIN_CONF && !ESCAPE_LABELS.has(d.label));
  const indeterminate = confident.length === 0;

  const curLabels  = new Set(confident.map(d => d.label));
  const prevLabels = new Set((prevEnv || []).map(d => d.label));
  const prevByLabel = new Map((prevEnv || []).map(d => [d.label, d.score]));

  const added     = confident.filter(d => !prevLabels.has(d.label)).map(d => d.label);
  const dropped   = [...prevLabels].filter(l => !curLabels.has(l));
  const persisting = confident
    .filter(d => prevLabels.has(d.label))
    .map(d => {
      const streak = (envStreaks[d.label] || 1) + 1;
      const drift  = Math.round((d.score - prevByLabel.get(d.label)) * 100);
      return { label: d.label, streak, drift };
    });

  // Update streaks: persisting labels increment, everything else resets/drops
  const nextStreaks = {};
  for (const d of confident) {
    nextStreaks[d.label] = prevLabels.has(d.label) ? (envStreaks[d.label] || 1) + 1 : 1;
  }
  envStreaks = nextStreaks;
  prevEnv = confident;
  prevEnvTime = now;

  return { added, dropped, persisting, isFirst, secsSince, indeterminate };
}

function formatElapsed(secs) {
  if (secs === null) return '';
  if (secs < 90) return `${secs}s`;
  return `${Math.round(secs / 60)}m`;
}

// ── Result rendering (shared by ambient + bird results) ────────────────────
const enc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function renderResult(kind, key, ranked, delta) {
  const ts = hhmm();
  lastOut = { ts, ranked, kind, key, delta };
  const lines = [
    '<span class="p">{</span>',
    `  <span class="k">"ts"</span><span class="p">:</span> <span class="s">"${ts}"</span><span class="p">,</span>`,
    `  <span class="k">"${key}"</span><span class="p">: [</span>`,
    ...ranked.map((d,i) => {
      const comma = i < ranked.length - 1 ? '<span class="p">,</span>' : '';
      return `    <span class="p">{</span> <span class="k">"label"</span><span class="p">:</span> <span class="s">"${enc(d.label)}"</span><span class="p">,</span> <span class="k">"conf"</span><span class="p">:</span> <span class="n">${Math.round(d.score * 100)}</span> <span class="p">}</span>${comma}`;
    }),
    delta ? '  <span class="p">],</span>' : '  <span class="p">]</span>'
  ];
  if (delta) {
    lines.push(`  <span class="k">"delta"</span><span class="p">:</span> <span class="s">"${enc(formatDeltaShort(delta))}"</span>`);
  }
  lines.push('<span class="p">}</span>');
  resPre.innerHTML = lines.join('\n');
  resultEl.style.display = 'block';
}

function formatDeltaShort(delta) {
  if (delta.isFirst) return 'first tap — no prior baseline';
  const elapsed = delta.secsSince !== null ? `[${formatElapsed(delta.secsSince)}] ` : '';
  if (delta.indeterminate) return elapsed + 'too quiet/uniform — no confident signal';
  const parts = [];
  delta.added.forEach(l => parts.push(`+${l}`));
  delta.dropped.forEach(l => parts.push(`-${l}`));
  delta.persisting.forEach(p => {
    const sign = p.drift > 0 ? '+' : '';
    parts.push(`~${p.label}(${p.streak}${p.drift ? `,${sign}${p.drift}` : ''})`);
  });
  return elapsed + (parts.length ? parts.join(' ') : 'no change');
}

// ── Main ─────────────────────────────────────────────────────────────────
async function handleTap() {
  if (!ready) return;
  ready = false;
  resultEl.style.display = 'none';
  tap.classList.add('busy','rec');
  tapIcon.textContent = '⏺';
  setStatus('recording…');

  try {
    const audio = await recordAudio();
    tap.classList.remove('rec'); tap.classList.add('proc');
    tapIcon.textContent = '⚙️'; tapLbl.textContent = 'analyzing…';
    setStatus('running inference…');

    const speechFrac = await speechFraction(audio);
    const ranked = await classify(audio, speechFrac >= VAD_SPEECH_FRAC_THRESHOLD);
    const delta  = computeDelta(ranked);
    renderResult('env', 'env', ranked, delta);
    setStatus('done');

  } catch(e) {
    setStatus('error — ' + e.message);
    console.error(e);
  }

  tap.classList.remove('busy','rec','proc');
  tapIcon.textContent = '🎙'; tapLbl.textContent = 'tap to record';
  ready = true;
}

// ── Copy ─────────────────────────────────────────────────────────────────
function doCopy(text, btn, label) {
  navigator.clipboard.writeText(text)
    .then(() => { btn.textContent = '✓ copied'; btn.classList.add('ok'); setTimeout(() => { btn.textContent = label; btn.classList.remove('ok'); }, 1600); })
    .catch(console.error);
}
function copyJSON() {
  if (!lastOut) return;
  const toCopy = lastOut.kind === 'env'
    ? lastOut.ranked.filter(d => d.score >= COPY_MIN_CONF && !ESCAPE_LABELS.has(d.label))
    : lastOut.ranked;
  const obj = { ts: lastOut.ts, [lastOut.key]: toCopy.map(d => ({ label: d.label, conf: Math.round(d.score * 100) })) };
  if (lastOut.delta) obj.delta = lastOut.delta.isFirst ? 'first tap' : formatDeltaShort(lastOut.delta);
  doCopy(JSON.stringify(obj, null, 2), btnJson, 'json');
}
function copyShort() {
  if (!lastOut) return;
  const icon = lastOut.kind === 'bird' ? '🐦' : lastOut.kind === 'yamnet' ? '🌊' : '🎙';
  const toCopy = lastOut.kind === 'env'
    ? lastOut.ranked.filter(d => d.score >= COPY_MIN_CONF && !ESCAPE_LABELS.has(d.label))
    : lastOut.ranked;
  const body = toCopy.length
    ? toCopy.map(d => `${d.label} (${Math.round(d.score * 100)}%)`).join(' · ')
    : 'no confident signal';
  const deltaStr = lastOut.delta ? ` | Δ ${formatDeltaShort(lastOut.delta)}` : '';
  doCopy(`${icon} ${lastOut.ts} | ${body}${deltaStr}`, btnShort, 'short');
}

// ── BirdNET (species ID) ────────────────────────────────────────────────
// Model + custom MelSpec/STFT kernel adapted from georg95/birdnet-web
// (Cornell Lab of Ornithology BirdNET, CC BY-NC-SA 4.0)
const BIRD_BASE   = 'https://cdn.jsdelivr.net/gh/georg95/birdnet-web@main/models/birdnet';
const BIRD_SR     = 48000;
const BIRD_MS     = 3000;
const BIRD_LEN    = 144000; // 3s @ 48kHz, fixed input shape the model expects
const BIRD_MIN_CONF = 0.08;
const BIRD_TOP_N  = 5;

const birdBtn    = document.getElementById('bird');
const birdIcon   = document.getElementById('bird-icon');
const birdLbl    = document.getElementById('bird-lbl');
const birdStatus = document.getElementById('bird-status');
const setBirdStatus = s => { birdStatus.textContent = s; };

let birdReady  = false;
let birdBusy   = false;
let birdModel  = null;
let birdLabels = null;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = () => reject(new Error('failed to load ' + src));
    document.head.appendChild(s);
  });
}

function registerBirdNetKernels(tf) {
  class MelSpecLayerSimple extends tf.layers.Layer {
    constructor(config) {
      super(config);
      this.sampleRate    = config.sampleRate;
      this.specShape     = config.specShape;
      this.frameStep     = config.frameStep;
      this.frameLength   = config.frameLength;
      this.melFilterbank = tf.tensor2d(config.melFilterbank);
    }
    build(inputShape) {
      this.magScale = this.addWeight('magnitude_scaling', [], 'float32', tf.initializers.constant({ value: 1.23 }));
      super.build(inputShape);
    }
    computeOutputShape(inputShape) { return [inputShape[0], this.specShape[0], this.specShape[1], 1]; }
    call(inputs) {
      return tf.tidy(() => {
        inputs = inputs[0];
        return tf.stack(inputs.split(inputs.shape[0]).map((input) => {
          let spec = input.squeeze();
          spec = tf.sub(spec, tf.min(spec, -1, true));
          spec = tf.div(spec, tf.max(spec, -1, true).add(0.000001));
          spec = tf.sub(spec, 0.5);
          spec = tf.mul(spec, 2.0);
          spec = tf.engine().runKernel('STFT', { signal: spec, frameLength: this.frameLength, frameStep: this.frameStep });
          spec = tf.matMul(spec, this.melFilterbank);
          spec = spec.pow(2.0);
          spec = spec.pow(tf.div(1.0, tf.add(1.0, tf.exp(this.magScale.read()))));
          spec = tf.reverse(spec, -1);
          spec = tf.transpose(spec);
          spec = spec.expandDims(-1);
          return spec;
        }));
      });
    }
    static get className() { return 'MelSpecLayerSimple'; }
  }
  tf.serialization.registerClass(MelSpecLayerSimple);

  // WebGL radix-2 real FFT, copied verbatim from georg95/birdnet-web (birdnet.js)
  tf.registerKernel({
    kernelName: 'STFT', backendName: 'webgl',
    kernelFunc: ({ backend, inputs: { signal, frameLength, frameStep } }) => {
      const innerDim = frameLength / 2;
      const batch = (signal.size - frameLength + frameStep) / frameStep | 0;
      let currentTensor = backend.runWebGLProgram({
        variableNames: ['x'], outputShape: [batch, frameLength],
        userCode: `
        void main() {
            ivec2 coords = getOutputCoords();
            int p = coords[1] % ${innerDim};
            int k = 0;
            for (int i = 0; i < ${Math.log2(innerDim)}; ++i) {
                if ((p & (1 << i)) != 0) { k |= (1 << (${Math.log2(innerDim) - 1} - i)); }
            }
            int i = 2 * k;
            if (coords[1] >= ${innerDim}) {
                i = 2 * (k % ${innerDim}) + 1;
            }
            int q = coords[0] * ${frameLength} + i;
            float val = getX((q / ${frameLength}) * ${frameStep} + q % ${frameLength});
            float cosArg = ${2.0 * Math.PI / frameLength} * float(q);
            float mul = 0.5 - 0.5 * cos(cosArg);
            setOutput(val * mul);
        }`
      }, [signal], 'float32');
      for (let len = 1; len < innerDim; len *= 2) {
        let prevTensor = currentTensor;
        currentTensor = backend.runWebGLProgram({
          variableNames: ['x'], outputShape: [batch, innerDim * 2],
          userCode: `void main() {
              ivec2 coords = getOutputCoords();
              int batch = coords[0];
              int i = coords[1];
              int k = i % ${innerDim};
              int isHigh = (k % ${len * 2}) / ${len};
              int highSign = (1 - isHigh * 2);
              int baseIndex = k - isHigh * ${len};
              float t = ${Math.PI / len} * float(k % ${len});
              float a = cos(t);
              float b = sin(-t);
              float oddK_re = getX(batch, baseIndex + ${len});
              float oddK_im = getX(batch, baseIndex + ${len + innerDim});
              if (i < ${innerDim}) {
                  float evenK_re = getX(batch, baseIndex);
                  setOutput(evenK_re + (oddK_re * a - oddK_im * b) * float(highSign));
              } else {
                  float evenK_im = getX(batch, baseIndex + ${innerDim});
                  setOutput(evenK_im + (oddK_re * b + oddK_im * a) * float(highSign));
              }
          }`
        }, [currentTensor], 'float32');
        backend.disposeIntermediateTensorInfo(prevTensor);
      }
      const real = backend.runWebGLProgram({
        variableNames: ['x'], outputShape: [batch, innerDim + 1],
        userCode: `void main() {
            ivec2 coords = getOutputCoords();
            int batch = coords[0];
            int i = coords[1];
            int zI = i % ${innerDim};
            int conjI = (${innerDim} - i) % ${innerDim};
            float Zk0 = getX(batch, zI);
            float Zk1 = getX(batch, zI+${innerDim});
            float Zk_conj0 = getX(batch, conjI);
            float Zk_conj1 = -getX(batch, conjI+${innerDim});
            float t = ${-2 * Math.PI} * float(i) / float(${innerDim * 2});
            float diff0 = Zk0 - Zk_conj0;
            float diff1 = Zk1 - Zk_conj1;
            float result = (Zk0 + Zk_conj0 + cos(t) * diff1 + sin(t) * diff0) * 0.5;
            setOutput(result);
        }`
      }, [currentTensor], 'float32');
      backend.disposeIntermediateTensorInfo(currentTensor);
      return real;
    }
  });
}

async function ensureBirdModel() {
  if (birdReady) return;
  setBirdStatus('loading tensorflow.js…');
  await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4/dist/tf.min.js');
  const tf = window.tf;
  await tf.setBackend('webgl');
  await tf.ready();
  registerBirdNetKernels(tf);

  setBirdStatus('downloading bird model (~50MB, first time only)…');
  birdModel = await tf.loadLayersModel(`${BIRD_BASE}/model.json`);

  setBirdStatus('loading species labels…');
  const raw = await fetch(`${BIRD_BASE}/labels/en_us.txt`).then(r => r.text());
  birdLabels = raw.split('\n').map(l => { const p = l.split('_'); return p[1] || p[0]; }).filter(Boolean);

  setBirdStatus('warming up…');
  tf.tidy(() => birdModel.predict(tf.zeros([1, BIRD_LEN])).dataSync());

  birdReady = true;
  setBirdStatus('');
}

async function classifyBird(samples) {
  const tf = window.tf;
  // Pad or trim to exactly 144000 samples (3s @ 48kHz) — fixed model input shape
  let fixed = samples;
  if (fixed.length !== BIRD_LEN) {
    const padded = new Float32Array(BIRD_LEN);
    padded.set(fixed.subarray(0, Math.min(fixed.length, BIRD_LEN)));
    fixed = padded;
  }
  const scores = tf.tidy(() => birdModel.predict(tf.tensor(fixed, [1, BIRD_LEN])).dataSync());
  const out = [];
  for (let i = 0; i < scores.length && i < birdLabels.length; i++) {
    if (scores[i] >= BIRD_MIN_CONF) out.push({ label: birdLabels[i], score: scores[i] });
  }
  out.sort((a, b) => b.score - a.score);
  return out.slice(0, BIRD_TOP_N);
}

async function handleBirdTap() {
  if (birdBusy) return;
  birdBusy = true;
  birdBtn.classList.add('busy');
  resultEl.style.display = 'none';

  try {
    await ensureBirdModel();
    birdBtn.classList.add('proc');
    birdIcon.textContent = '⏺'; birdLbl.textContent = 'listening…';
    setBirdStatus('recording 3s @ 48kHz…');

    const audio = await recordAudio(BIRD_SR, BIRD_MS, birdLbl);
    birdIcon.textContent = '⚙️'; birdLbl.textContent = 'identifying…';
    setBirdStatus('running inference…');

    const ranked = await classifyBird(audio);
    if (ranked.length) {
      renderResult('bird', 'species', ranked);
      setBirdStatus('done');
    } else {
      setBirdStatus('no confident match');
    }
  } catch (e) {
    setBirdStatus('error — ' + e.message);
    console.error(e);
  }

  birdBtn.classList.remove('busy','proc');
  birdIcon.textContent = '🐦'; birdLbl.textContent = 'bird id';
  birdBusy = false;
}

// ── YAMNet (test button) ────────────────────────────────────────────────
// Google's AudioSet-trained classifier, 521 fixed classes — being trialed
// as a possible replacement/complement for the CLAP zero-shot env tap.
// Unlike CLAP's forced comparison against ENV_LABELS, YAMNet's classes are
// independent (not summing to ~100%) and include specific categories CLAP's
// hand-picked list doesn't (e.g. "Cicada", "Wind chime", "Insect") — the
// whole reason this is worth testing separately before touching the main
// button. Kept fully separate/removable: doesn't touch prevEnv/envStreaks
// delta tracking, doesn't share ENV_LABELS or ESCAPE_LABELS.
//
// NOTE: this is a first pass, untested against the live model — the TF Hub
// graph model's exact input/output tensor names can vary by conversion.
// If ensureYamnetModel()/classifyYamnet() throws on the first real tap,
// check the error against the model's actual signature (log
// yamnetModel.inputs / yamnetModel.outputs to inspect) and adjust the
// execute() call below accordingly.
const YAMNET_TFHUB_URL   = 'https://tfhub.dev/google/tfjs-model/yamnet/tfjs/1/default/1';
const YAMNET_CLASSMAP_URL = 'https://raw.githubusercontent.com/tensorflow/models/master/research/audioset/yamnet/yamnet_class_map.csv';
const YAMNET_SR       = 16000; // YAMNet's expected input rate
const YAMNET_MS       = RECORD_MS; // reuse the same 4s clip length as the env tap
const YAMNET_MIN_CONF = 0.15; // AudioSet classes are independent, not a forced pool — tune after real taps
const YAMNET_TOP_N    = 5;

const yamnetBtn    = document.getElementById('yamnet');
const yamnetIcon   = document.getElementById('yamnet-icon');
const yamnetLbl    = document.getElementById('yamnet-lbl');
const yamnetStatus = document.getElementById('yamnet-status');
const setYamnetStatus = s => { yamnetStatus.textContent = s; };

let yamnetReady  = false;
let yamnetBusy   = false;
let yamnetModel  = null;
let yamnetLabels = null;

// Minimal CSV parser — handles the one quoted/comma-containing display_name
// case in the class map (e.g. "Bell, chime, ...") without pulling in a lib.
function parseCsvLine(line) {
  const out = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuotes = !inQuotes; }
    else if (c === ',' && !inQuotes) { out.push(cur); cur = ''; }
    else { cur += c; }
  }
  out.push(cur);
  return out;
}

async function ensureYamnetModel() {
  if (yamnetReady) return;
  setYamnetStatus('loading tensorflow.js…');
  // Reuse tfjs if BirdNET already loaded it on this page load
  if (!window.tf) {
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4/dist/tf.min.js');
  }
  const tf = window.tf;
  if (!tf.getBackend()) { await tf.setBackend('webgl'); }
  await tf.ready();

  setYamnetStatus('downloading YAMNet (~17MB, first time only)…');
  yamnetModel = await tf.loadGraphModel(YAMNET_TFHUB_URL, { fromTFHub: true });

  setYamnetStatus('loading class map…');
  const csvText = await fetch(YAMNET_CLASSMAP_URL).then(r => r.text());
  yamnetLabels = csvText.trim().split('\n').slice(1) // drop header row
    .map(line => parseCsvLine(line)[2]) // columns: index,mid,display_name
    .filter(Boolean);

  setYamnetStatus('warming up…');
  tf.tidy(() => {
    const out = yamnetModel.execute(tf.zeros([YAMNET_SR])); // ~1s dummy clip
    (Array.isArray(out) ? out : [out]).forEach(t => t.dataSync());
  });

  yamnetReady = true;
  setYamnetStatus('');
}

async function classifyYamnet(samples) {
  const tf = window.tf;
  return tf.tidy(() => {
    const input = tf.tensor1d(samples);
    const out = yamnetModel.execute(input);
    // Graph model may return a single scores tensor or [scores, embeddings, spectrogram]
    const scoresT = Array.isArray(out) ? out[0] : out;
    const meanScores = scoresT.mean(0); // average per-frame scores across the clip
    const scores = meanScores.dataSync();
    const ranked = [];
    for (let i = 0; i < scores.length && i < yamnetLabels.length; i++) {
      if (scores[i] >= YAMNET_MIN_CONF) ranked.push({ label: yamnetLabels[i], score: scores[i] });
    }
    return ranked.sort((a, b) => b.score - a.score).slice(0, YAMNET_TOP_N);
  });
}

async function handleYamnetTap() {
  if (yamnetBusy) return;
  yamnetBusy = true;
  yamnetBtn.classList.add('busy');
  resultEl.style.display = 'none';

  try {
    await ensureYamnetModel();
    yamnetBtn.classList.add('proc');
    yamnetIcon.textContent = '⏺'; yamnetLbl.textContent = 'listening…';
    setYamnetStatus(`recording ${YAMNET_MS/1000}s @ ${YAMNET_SR/1000}kHz…`);

    const audio = await recordAudio(YAMNET_SR, YAMNET_MS, yamnetLbl);
    yamnetIcon.textContent = '⚙️'; yamnetLbl.textContent = 'identifying…';
    setYamnetStatus('running inference…');

    const ranked = await classifyYamnet(audio);
    if (ranked.length) {
      renderResult('yamnet', 'yamnet', ranked);
      setYamnetStatus('done');
    } else {
      setYamnetStatus('no confident match');
    }
  } catch (e) {
    setYamnetStatus('error — ' + e.message);
    console.error(e);
  }

  yamnetBtn.classList.remove('busy','proc');
  yamnetIcon.textContent = '🌊'; yamnetLbl.textContent = 'yamnet (test)';
  yamnetBusy = false;
}

// ── Wire up ──────────────────────────────────────────────────────────────
tap.addEventListener('click', handleTap);
btnJson.addEventListener('click', copyJSON);
btnShort.addEventListener('click', copyShort);
birdBtn.addEventListener('click', handleBirdTap);
yamnetBtn.addEventListener('click', handleYamnetTap);
init();
</script>
